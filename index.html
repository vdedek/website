78,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f8389f-0505-49aa-a5a2-f0c0f87ec1f2logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;![2.jpg](../assets/2_1710761953811_0.jpg)logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Flogseq____&quot;,84,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Xlogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Vlogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^Ulogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[79,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f8389f-f596-4356-965d-074b4017c353logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;“Ludomancer lives, we would say it survives as an idea. But it is much more than that. Ludomancer borrows players in the same way that players borrow game characters. It filters out all vestiges of identity and then glides across the smooth grey field of their consciousness. Like a waterstrider skimming the surface of a still pool.“logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Flogseq____&quot;,78,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Xlogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Vlogseq____&quot;,81,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Ulogseq____&quot;,53,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^Ulogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[80,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f8389f-d054-4d87-a067-9d668d5f3488logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;The audio work is an audiobook style narrative with interludes of stone keyboard samples. Heavily inspired by, and in many places quoting, T. Bernhard‘s novel [[The Correction]]. The narrative revolves around gaming, its possible liminal forms, its psychology and the psychology of the relationship between the game characters and the player characters themselves, escape, solitude, alienation, the relationship of gaming to the night, the non-formation of memory, the attempt to understand gaming, the attempt to stop - to stop with everything... Unlike the novel, here it is not clear what happened to the main character.logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Flogseq____&quot;,88,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Xlogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Vlogseq____&quot;,70,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Ulogseq____&quot;,53,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Ulogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^Hlogseq____&quot;,53,536870919]],[logseq____&quot;^15logseq____&quot;,[81,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f8389f-e111-45a3-85fa-c64aaf193dbflogseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;*„Ludomancer, the title character and the focal point of Viktor Dedek‘s installation, seems to be introducing us to the world of past and future myths, but at the same time remains consciously trapped in the banality of today. The first part of this neologism refers to the environment of games and players (the Latin word ludus means game), the second to medieval necromancers and nigromancers, black priests who cast spells on the living and the dead. As a whole, however, it also evokes William Gibson‘s famous cyberpunk opus Neuromancer. And it is within this range of meaning that the untold stories of Dedek‘s installation circle. Archaic-futuristic stone chairs, an abandoned bar, a radio receiver from which the reflective thoughts of a ludomancer can be heard, but also quotations from Thomas Bernhard‘s novel The Correction and Gibson‘s Neuromancer.“*logseq____&quot;,536870935]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Flogseq____&quot;,65,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Xlogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Vlogseq____&quot;,65,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^Ulogseq____&quot;,56,536870919]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536870935]],[logseq____&quot;^15logseq____&quot;,[82,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f8389f-8360-4959-8a06-6776eb47b4f2logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[83,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;#### [Listen to audio here (CZ only)](https://soundcloud.com/viktor-dedek-106155248/ludomancer-radio-version/s-RvWXt6LwQt0?si=fbbcf1b3f8d4487c97fa9c135abed98alogseq____&amp;utm_source=clipboardlogseq____&amp;utm_medium=textlogseq____&amp;utm_campaign=social_sharing)logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[83,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[8       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
