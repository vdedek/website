 site will be conveyed through numerous accompanying events, which will not only focus on the gallery itself, but on the entire UMPRUM building on Náměstí Jana Palacha. *\\logseq____&quot;In the installation itself and through the accompanying programme, we want to offer a view of Kafkárna as a meeting place, a laboratory, a hiding place, and a source of knowledge. During the course of the exhibition, we will temporarily transfer themes and activities of the Kafkárna to the entire school building so that they figuratively permeate all floors, and potentially find roots at the Náměstí Jana Palacha building. Whether it is thematic lectures, seminars, workshops, for instance, vegetarian cooking, hairdressing, and yoga”* as the exhibition curators Amálie Bulandrová, and Kateřina Vídenová explain. Visitors can look forward to various creative workshops, and seminars, as well as a special \\logseq____&quot;Kafkárna\\logseq____&quot; menu in the school cafeteria U Princezny, or a football match in the courtyard of the neighbouring Dance Conservatory of the Capital City of Prague.logseq____&quot;,536874586]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536874586]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^Flogseq____&quot;,567,536874586]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^Xlogseq____&quot;,472,536874586]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^Vlogseq____&quot;,591,536874655]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^Ulogseq____&quot;,472,536874587]],[logseq____&quot;^15logseq____&quot;,[568,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65fd6136-bfc0-4aca-8245-a42e7f02730elogseq____&quot;,536874586]],[logseq____&quot;^15logseq____&quot;,[569,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;*\\logseq____&quot;The Kafkárna is one of the three buildings used by UMPRUM. Its environment and atmosphere alone dictate that loca       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
