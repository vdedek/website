f which was an abandoned bar from the 1990s. While this part is normally used as a storage space, it was made accessible for the purposes of this exhibition. The result was a space with several layers of time, which then became the setting for the site-specific exhibition.\\nIn the first room, the viewer came across a swivel chair made of massive, roughly hewn sandstone boulders. In the connecting corridor was a radio transmitter in the form of several printed circuit boards embedded in carved stone boxes. In the last room, that abandoned bar, was a radio receiver playing a thirty-minute audio piece. Prints of AI-generated photographs of forest clearings were subtly installed among the empty glasses on the shelves and in the drink menu.logseq____&quot;,536872815]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536872797]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Flogseq____&quot;,306,536874535]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Xlogseq____&quot;,46,536872797]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Vlogseq____&quot;,306,536874545]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Ulogseq____&quot;,46,536874943]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536872815]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f74c6d-0483-4528-b08b-ddcd89582351logseq____&quot;,536872797]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;The audio work is an audiobook style narrative with interludes of stone keyboard samples. Heavily inspired by, and in many places quoting, T. Bernhard‘s novel [[The Correction]]. The narrative revolves around gaming, its possible liminal forms, its psychology and the psychology of the relationship between the game characters and the player characters themselves, escape, solitude, alienation, the relationship of gaming to the night, the non-formation of memory, the attempt to understand gaming, the attempt to stop - to stop with everything... Unlike the novel, here it is not clear what happened to the main character.logseq____&quot;,536872854]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536872815]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Flogseq____&quot;,203,536874549]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Xlogseq____&quot;,46,536872815]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Vlogseq____&quot;,306,536874549]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Ulogseq____&quot;,46,536874943]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Ulogseq____&quot;,211,536874943]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536872854]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^Hlogseq____&quot;,211,536872854]],[logseq____&quot;^15logseq____&quot;,[205,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65f74c8a-b0c0-4cc9-b76f-d46b28da8ab4logseq____&quot;,536872815]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;“Ludomancer lives, we would say it survives as an idea. But it is much more than that. Ludomancer borrows players in the same way that players borrow game characters. It filters out all vestiges of identity and then glides across the smooth grey field of their consciousness. Like a waterstrider skimming the surface of a still pool.“logseq____&quot;,536874856]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536872819]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Flogseq____&quot;,208,536872830]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
