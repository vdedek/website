ties - gaming nights where a bunch of friends brought their own computers, linked them together and crush multiplayer games in close physical proximity. Y: LAN Party uses this approach as a grounding; opening the theatre´s space up towards an evening and nighttime zone filled with playing together - not just computer games, but playing with our own identities, our bodies, the world around us, and who we all can and could be.\\n\\nA party where visitors’ physical bodies will be dissolved into a digital conglomeration of 1s and 0s. And vice-versa. No one can be sure of reality, because the virtual isn’t the opposite of reality, but an inseparable part of it. LARPers use the term “bleed” to describe the moment when “the world of the game” begins to spill over into “reality.” We’re opening the floodgates and engaging in transformation with a very specific goal – to enjoy a moment of disconnection from the everyday, economised and normalised environment. Or, on the contrary: a welcome and wanted connection, where I/we voluntarily accept someone else’s rules and allow myself/ourselves to be led through a transformed landscape that ultimately seeps into the landscape of the everyday.logseq____&quot;,536876643]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536876579]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^@logseq____&quot;,false,536876579]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^Flogseq____&quot;,737,536876795]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^Xlogseq____&quot;,704,536876579]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^Vlogseq____&quot;,704,536876579]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^Ulogseq____&quot;,704,536876580]],[logseq____&quot;^15logseq____&quot;,[708,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^1Glogseq____&quot;,logseq____&quot;65fd87e7-827e-469b- ntangle and bury the border stones. He knew every one of these stones as a good friend, and these friends were now all being buried. \\logseq____&quot;Borders, currencies, languages ​​and finally dances will mix\\logseq____&quot; he thought, waving his hand over his head and letting it fall slightly in a spiral curve, like a local dance greeting. When in that he seemed to see someone on the other side of the former border, leaning against a tree like him and a hand that returned the greeting.\\nlogseq____&gt; \\logseq____&quot;We will wander together on the border between the first and second worlds, do you understand?\\logseq____&quot; described Balto excitedly “There are rules that allow us to move and do other things in this other world. I will tell you and you tell me, and together we will talk and have fun and laugh and cry with emotion when we go back to the world without borders\\logseq____&quot; continued Balto flowery in his fantasy and firmly grasped Silhlogseq____&apos;s hand \\logseq____&quot;into a world full of pain and suffering, but we will be strengthened by hope. Do you understand Hope! there is a line somewhere. A border worth returning to!” Balto triumphed, reaching for the fresh tankard. Silha, with eyes full of tears, looked somewhere behind him: \\logseq____&quot;A border as impenetrable and mysterious as the deepest forest... like the widest river bed, flowing into the open sea.\\logseq____&quot; Balta let the tank top the table, swallowed and added \\logseq____&quot;The sea that turns into an endless ocean.\\logseq____&quot;\\n\\nThe game Dračí Doupě, the Czech version of Dungeons logseq____&amp; Dragons, contains the profession Ranger. Similar to other RPGs (Role-Playing-Games), this one is also about a solitary character who is close to nature, understands its inhabitants and knows how to use its healing potential. Mainly because of his dog, we could see a certain resemblance in him to the characters who once protected the borders of European states, but that has long since ended. \\n\\nIn the third part of our Euro-medieval saga called Ranger, we will look together at the new form of such a profession. On the borders of the primary, our, the world and the secondary world, fantasy, which merge and disappear during the Euro-Medieval period, similar to the boundary stones of the villages producing BIO-NFT Vanilla gluten-free muffins.\\n\\n**The game Dlogseq____&amp;D is set in a fantasy world, but the possibilities of this RPG are unlimited - from historical reconstructions to completely abstract worlds of other forms and laws. The imaginative and fictional character of the game allows permeability in the context of current political issues, and thus enables the creation of a whole spectrum of environments - from totally discriminatory to utopian tolerant. Another characteristic feature of the game is the minimalism of the requirements for game resources (a pencil, paper and a dice are enough).**logseq____&quot;,536878520]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536878297]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^@logseq____&quot;,false,536878297]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^Flogseq____&quot;,844,536878376]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^Xlogseq____&quot;,130,536878297]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^Vlogseq____&quot;,844,536878376]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^Ulogseq____&quot;,130,536878467]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536878520]],[logseq____&quot;^15logseq____&quot;,[846,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65fda91d-e82f-4f95-8478-887e39eaeac6logseq____&quot;,536878297]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Mlogseq____&quot;,true,536878355]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;**CZ version:**logseq____&quot;,536878358]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536878310]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^@logseq____&quot;,false,536878310]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Flogseq____&quot;,856,536878454]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Xlogseq____&quot;,130,536878310]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Vlogseq____&quot;,844,536878376]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^Ulogseq____&quot;,130,536878467]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536878445]],[logseq____&quot;^15logseq____&quot;,[847,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65fda94e-020e-468b-92ff-527068e9dafelogseq____&quot;,536878310]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;*“K čemu je hraničář ve světě, kde nejsou žádné hranice?” pomyslel si hraničář Silha dívaje se na vesničany, jak vyviklávají a zahrabávají hraniční kameny. Znal každý jeden tento kámen jako dobrého přítele a tito přátelé byli nyní všichni pohřbíváni. “Smísí se hranice, platidla, jazyky a nakonec i tance” přemýšlel, mávl rukou nad hlavu a nechal ji zlehka spadnout v točité křivce, coby místní taneční pozdrav. Když v tom, jakoby zahlédl někoho na druhé straně bývalé hranice, opírajícího se o strom podobně jako on a ruku, která mu pozdrav oplatila.*\\n*“Budeme spolu bloumat na hranici mezi prvním a druhým světem, chápeš?” vzrušeně popisoval Balto “Existují pravidla, která nám umožní pohyb a další činnosti v tomto druhém světě. Já budu vyprávět tobě a ty mě a budeme si společně povídat a bavit se a smát se a plakat dojetím, když se vrátíme zpět do světa bez hranic” pokračoval květnatě Balto ve svém líčení a pevně uchopil Silhovu ruku “do světa plného bolesti a utrpení, ale budeme posílení nadějí. Rozumíš? Nadějí, že tam někde je hranice. Hranice, ke které stojí za to se vracet!” triumfoval Balto a chápal se po čerstvém korbelu. Silha se s očima plných slz zahleděl někam za něj: “Hranice tak neprostupná a tajuplná, jako ten nejhlubší les… jako nejširší koryto řeky, vtékající do širého moře.” Balta nechal dopadnout korbel na stůl, polknul a dodal “Moře, které se mění v nekonečný oceán.”*\\n*Hra Dračí Doupě, česká verze Dungeons logseq____&amp; Dragons, obsahuje povolání Hraničáře. Podobně jako další RPG (Role-Playing-Game, česky: hraní na hrdiny), i zde jde o samotářskou postavu, která má blízko k přírodě, rozumí jejím obyvatelům a umí využít její léčivý potenciál. Především kvůli jeho psu bychom v něm mohli spatřovat určitou podobnost s postavami, kteří kdysi chránili hranice evropských států, ale tomu už je dávno konec. *\\nVe třetím dílu naší eurostředověké ságy nazvané Hraničáři se spolu podíváme na novou podobu takového povolání. Na hranice prvotního, našeho, světa a světa druhotného, fantasy, které se v době eurostředověku prolínají a mizí, podobně jako hraniční kameny vesnic produkující BIO-NFT Vanilkové bezlepkové muffiny.logseq____&quot;,536878352]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536878326]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^@logseq____&quot;,false,536878326]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Flogseq____&quot;,847,536878326]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Xlogseq____&quot;,130,536878326]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Vlogseq____&quot;,847,536878328]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^Ulogseq____&quot;,130,536878467]],[logseq____&quot;^15logseq____&quot;,[848,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;],536878352]],[logseq_       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
